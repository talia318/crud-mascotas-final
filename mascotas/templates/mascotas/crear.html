<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="container" style="max-width: 500px;">
          <div class="card shadow p-4"> 
    
        
        <h1 class="text-center mb-4" style="font-family: 'Poppins', sans-serif;">
   
    <a href="/" class="btn btn-secondary mb-3">
    ⬅️ Volver
</a>
 Crear Mascota
</h1>
<div class="d-flex justify-content-center">
    {% if error %}
        <div id="error-alert" class="alert alert-danger text-center position-fixed top-0 start-50 translate-middle-x mt-3 shadow" style="z-index: 9999; min-width: 300px;">
        {{ error }}
    </div>
{% endif %}
</div>
<form method="post" autocomplete="off">
    {% csrf_token %}

    <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input type="text" name="nombre" class="form-control" required>
</div>
   <div class="mb-3">
    <label class="form-label">Codigo</label>
    <input type="text" name="codigo" class="form-control" required>
</div>

   <label class="form-label">Edad</label>

<div class="row mb-3">
    <div class="col">
        <input type="number" name="edad_anios" class="form-control" placeholder="Años" min="0" max="100" required>
    </div>

    <div class="col">
        <input type="number" name="edad_meses" class="form-control" placeholder="Meses" min="0" max="11" required>
    </div>

    <div class="col">
        <input type="number" name="edad_dias" class="form-control" placeholder="Días" min="0" max="30" required>
    </div>
</div>

    <div class="mb-3">
    <label class="form-label">Especie</label>
    <input type="text" name="tipo" class="form-control" required>
</div>

    <button type="submit" class="btn btn-primary w-100">Guardar</button>
</form>
    </div>
     </div>
     </div>

 <script>
    setTimeout(function() {
        const alert = document.getElementById('error-alert');
        if (alert) {
            alert.style.transition = "opacity 0.5s";
            alert.style.opacity = "0";
            setTimeout(() => alert.remove(), 500);
        }
    }, 3000);
</script>
</body>
